name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          bun install
          bun add -D @capacitor/core @capacitor/cli @capacitor/android

      - name: Switch to static export config
        run: |
          cp next.config.static.ts next.config.ts

      - name: Temporarily move API routes
        run: |
          mkdir -p .temp-api-routes
          mv src/app/api .temp-api-routes/api
          echo "API routes temporarily moved"

      - name: Build Next.js static export
        run: |
          bun run build

      - name: Restore API routes
        run: |
          mv .temp-api-routes/api src/app/api
          rm -rf .temp-api-routes
          echo "API routes restored"

      - name: Initialize Capacitor
        run: |
          npx cap init "师道·人际关系智库" com.shidao.relations --web-dir out || true

      - name: Add Android platform
        run: |
          npx cap add android || true

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Create keystore directory
        run: mkdir -p android/app

      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

      - name: Build Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.signingConfigs.release.storeFile=app/release-keystore.jks \
            -Pandroid.signingConfigs.release.storePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.signingConfigs.release.keyAlias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.signingConfigs.release.keyPassword="${{ secrets.KEY_PASSWORD }}"
        continue-on-error: true

      - name: Build Debug APK (fallback)
        if: ${{ secrets.KEYSTORE_BASE64 == '' || failure() }}
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Find APK
        id: find_apk
        run: |
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            echo "apk_path=android/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "apk_type=release" >> $GITHUB_OUTPUT
          else
            echo "apk_path=android/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
            echo "apk_type=debug" >> $GITHUB_OUTPUT
          fi

      - name: Rename APK
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          TYPE=${{ steps.find_apk.outputs.apk_type }}
          mv ${{ steps.find_apk.outputs.apk_path }} shidao-relations-${VERSION}-${TYPE}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shidao-apk
          path: shidao-relations-*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: shidao-relations-*.apk
          body: |
            ## 师道·人际关系智库 V${{ github.ref_name }}
            
            ### 🎉 安装说明
            1. 下载APK文件
            2. 在Android设备上允许安装未知来源应用
            3. 安装APK文件
            4. **首次使用请在设置中配置后端API地址**
            
            ### ⚙️ 配置后端
            APK安装后需要配置后端API地址才能使用！
            
            **部署后端到Vercel：**
            ```bash
            npm i -g vercel
            vercel --prod
            ```
            然后将URL配置到APK设置中。
            
            ### ✨ 功能列表
            - ✅ 能量驾驶舱
            - ✅ 人物档案管理
            - ✅ 互动记录
            - ✅ 语音秒记
            - ✅ 困惑事件
            - ✅ 策略库
            - ✅ 数据导出
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## 构建完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: ${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **类型**: ${{ steps.find_apk.outputs.apk_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 使用说明" >> $GITHUB_STEP_SUMMARY
          echo "1. 安装APK后，进入**设置**页面" >> $GITHUB_STEP_SUMMARY
          echo "2. 找到**后端API配置**部分" >> $GITHUB_STEP_SUMMARY
          echo "3. 输入后端地址并保存" >> $GITHUB_STEP_SUMMARY
