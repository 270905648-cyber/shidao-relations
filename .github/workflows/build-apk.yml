name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          bun install
          bun add -D @capacitor/core @capacitor/cli @capacitor/android

      - name: Switch to static export config
        run: |
          cp next.config.static.ts next.config.ts

      - name: Remove API routes for static export
        run: |
          mv src/app/api src/app/api_backup

      - name: Build Next.js static export
        run: |
          bun run build

      - name: Restore API routes
        run: |
          mv src/app/api_backup src/app/api

      - name: Initialize Capacitor
        run: |
          npx cap init "师道·人际关系智库" com.shidao.relations --web-dir out || true

      - name: Add Android platform
        run: |
          npx cap add android || true

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          mv android/app/build/outputs/apk/debug/app-debug.apk shidao-relations-${VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shidao-apk
          path: shidao-relations-*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: shidao-relations-*.apk
          body: |
            ## 师道·人际关系智库 V${{ github.ref_name }}
            
            ### 安装说明
            1. 下载APK文件
            2. 在Android设备上允许安装未知来源应用
            3. 安装APK文件
            4. 首次使用请在设置中配置后端API地址
            
            ### 后端部署
            ```bash
            npm i -g vercel
            vercel --prod
            ```
            然后将URL配置到APK设置中。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
